<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>My Life App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="heading-container">
      <h1 class="space-heading">Gym Tracker</h1>
    </div>
    <nav class="main-nav">
      <button
        class="active"
        type="button"
        data-page="./apps/Gym/pages/stats.html"
        data-app="stats"
      >
        Stats
      </button>
      <button
        type="button"
        data-page="./apps/Gym/pages/addWorkout.html"
        data-app="add-workout"
      >
        Add Workout
      </button>
      <button
        type="button"
        data-page="./apps/Gym/pages/addExercise.html"
        data-app="add-exercise"
      >
        Add Exercise
      </button>
    </nav>

    <div id="error-banner">
      <p></p>
      <button id="remove-error-banner" type="button">X</button>
    </div>
    <main id="gym-content" class="gym-content"></main>
  </body>

  <script type="module" src="renderer.js"></script>
</html>
